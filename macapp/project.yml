name: Mailrs
options:
  bundleIdPrefix: jp.golia
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "26.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Mailrs:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Mailrs
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.golia.mailrs
        PRODUCT_NAME: Mailrs
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Mailrs/Mailrs.entitlements
        INFOPLIST_FILE: Mailrs/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  MailrsTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: MailrsTests
    dependencies:
      - target: Mailrs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.golia.mailrs.tests
        GENERATE_INFOPLIST_FILE: YES
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/Mailrs.app/Contents/MacOS/Mailrs"
        "TEST_HOST[sdk=iphoneos*]": "$(BUILT_PRODUCTS_DIR)/Mailrs.app/Mailrs"
        "TEST_HOST[sdk=iphonesimulator*]": "$(BUILT_PRODUCTS_DIR)/Mailrs.app/Mailrs"
        "BUNDLE_LOADER[sdk=macosx*]": "$(TEST_HOST)"
        "BUNDLE_LOADER[sdk=iphoneos*]": "$(TEST_HOST)"
        "BUNDLE_LOADER[sdk=iphonesimulator*]": "$(TEST_HOST)"

schemes:
  Mailrs:
    build:
      targets:
        Mailrs: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MailrsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
