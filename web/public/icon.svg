<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="flap" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde8e8"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- envelope body -->
  <rect x="96" y="148" width="320" height="208" rx="18" fill="white" opacity="0.95"/>
  <!-- envelope flap — visible light pink -->
  <path d="M96 168 C96 155 105 148 116 148 L396 148 C407 148 416 155 416 168 L256 284 Z" fill="url(#flap)"/>
  <!-- flap fold line — red-tinted to be visible on pink flap -->
  <path d="M96 166 L256 284 L416 166" fill="none" stroke="#dc2626" stroke-width="5" stroke-linejoin="round" opacity="0.35"/>
</svg>
