    <line x1="400" y1="336" x2="400" y2="344"/>
    <line x1="400" y1="392" x2="400" y2="400"/>
    <line x1="368" y1="368" x2="376" y2="368"/>
    <line x1="424" y1="368" x2="432" y2="368"/>
    <line x1="380" y1="348" x2="386" y2="354"/>
    <line x1="414" y1="382" x2="420" y2="388"/>
    <line x1="380" y1="388" x2="386" y2="382"/>
    <line x1="414" y1="354" x2="420" y2="348"/>
  </g>
</svg>
