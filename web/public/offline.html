<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mailrs — Offline</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #09090b;
        color: #a1a1aa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        text-align: center;
        padding: 2rem;
      }
      h1 { color: #fafafa; font-size: 1.25rem; margin-bottom: 0.5rem; }
      p { font-size: 0.875rem; line-height: 1.5; max-width: 20rem; }
      button {
        margin-top: 1.5rem;
        background: #dc2626;
        color: white;
        border: none;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>You are offline</h1>
      <p>Please check your network connection and try again. Cached content may still be available.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
