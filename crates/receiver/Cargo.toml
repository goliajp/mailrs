[package]
name = "mailrs-receiver"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0 OR MIT"
description = "Ports of the mailrs SMTP receiving path: the AccountStore / QuotaStore / ConnectionMetrics traits the receiver depends on (plus the pure ResolvedRecipient type), free of spg / kevy. The spg/kevy-backed adapters live in the server core. The seam the receiver/core split is built on. Internal until the abstraction stabilises."
publish = false

[lints]
workspace = true

# The standalone receiver process (P6): SMTP I/O + anti via kevy-server +
# antispam + spool write + SpoolDelivered notify. Zero spg / PG.
[[bin]]
name = "mailrs-receiver"
path = "src/main.rs"

[dependencies]
async-trait = { workspace = true }
mailrs-message-store = { path = "../message-store" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Shared session infra (event bus, UserStore, LdapConfig) + hot-reload TLS.
mailrs-core = { path = "../core" }
mailrs-tls-reload = "1"
# rustls crypto provider must be installed once per process before any TLS
# config is built (SMTPS/STARTTLS). The server binary does this in its run();
# the standalone receiver binary must do the same or rustls panics on first use.
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "tls12", "std"] }

# Inbound receiving pipeline + anti subsystems. mailrs-shield / mailrs-dmarc
# are pulled WITHOUT their /spg feature — the receiver uses only the
# backend-generic surface (GreylistDb over a GreylistBackend trait, the
# DMARC verifier), so it stays free of spg / kevy-embedded.
mailrs-inbound = "1"
mailrs-rfc5322 = "1"
mailrs-shield = { path = "../shield", version = "3" }
mailrs-dmarc = { path = "../dmarc", version = "2" }
mailrs-spf = { path = "../spf", version = "2" }
mailrs-dkim = { path = "../dkim", version = "3" }
mailrs-arc = { path = "../arc", version = "3" }
mailrs-intelligence = { path = "../intelligence", version = "3" }
mailrs-auth-guard = { path = "../auth-guard", version = "2" }
mailrs-rate-limit = "1"
mailrs-clamav = "1"
# Network kevy-server client for the receiver/core split: greylist/rate/auth
# state + SpoolDelivered notify go over kevy:// instead of in-process.
kevy-client = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# SMTP session machinery (S5.4). mailrs-outbound-queue is pulled WITHOUT
# its /spg feature — the receiver binds only the Notifier / QueueStore
# trait surfaces, never the spg-backed PgQueueStore.
mailrs-smtp-proto = "1"
mailrs-smtp-codec = "1"
mailrs-sieve = { path = "../sieve", version = "2" }
mailrs-outbound-queue = { path = "../outbound-queue", version = "4" }
mailrs-mail-builder = "1"
mailrs-delivery-executor = { path = "../delivery-executor", version = "1.2" }
# mailrs-mailbox is pulled WITHOUT its /spg feature — the receiver uses only
# the backend-generic threading helpers (message-id / in-reply-to parsing).
mailrs-mailbox = { path = "../mailbox", version = "1" }
mailrs-rfc2047 = "1"
mailrs-mime = { path = "../mime", version = "2" }
mailrs-srs = "1"
mailrs-arf = "1"

tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread", "time", "macros", "net", "io-util", "signal"] }
tokio-util = { version = "0.7", features = ["codec"] }
futures-util = { version = "0.3", features = ["sink"] }
hickory-resolver = "0.26"
ipnet = { workspace = true }
metrics = "0.24"
reqwest = { version = "0.13", default-features = false, features = ["json", "form", "rustls"] }
tracing = "0.1"
bytes = "1"
memchr = "2"
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.22"
argon2 = { workspace = true }
