[package]
name = "mailrs-outbound-queue"
version = "0.2.0"
edition = "2021"

[dependencies]
sqlx = { workspace = true }
redis = { workspace = true }
futures-util = "0.3"
chrono = "0.4"
mailrs-smtp-client = { path = "../smtp-client" }
hickory-resolver = "0.25"
tokio = { version = "1", features = ["sync", "time"] }
tracing = "0.1"
mail-auth = "0.7"
rustls-pki-types = { version = "1", features = ["alloc"] }
