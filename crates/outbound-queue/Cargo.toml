[package]
name = "mailrs-outbound-queue"
version = "2.0.0"
edition = "2024"
description = "Outbound mail queue primitives: DKIM signing, DSN generation, MTA-STS lookup, retry/backoff, with a pluggable store trait and a Postgres reference implementation."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-outbound-queue"
authors = ["GOLIA K.K."]
keywords = ["smtp", "outbound", "dkim", "dsn", "email"]
categories = ["email", "network-programming", "asynchronous"]
readme = "README.md"

[lints]
workspace = true

[features]
default = ["pg"]
# Enable the Postgres + Redis reference implementation of QueueStore /
# Notifier and the bundled DeliveryWorker that depends on them. Disable
# this feature if you're plugging in your own store backend.
pg = ["dep:sqlx", "dep:redis"]

[dependencies]
async-trait = "0.1"
thiserror = "2"
mailrs-backoff = "1"
tokio = { version = "1", features = ["sync", "time", "rt"] }
tracing = "0.1"
metrics = "0.24"
chrono = "0.4"
hickory-resolver = "0.26"
futures-util = "0.3"
rustls-pki-types = { version = "1", features = ["alloc"] }
# Type-only dependency: `try_deliver_via_mx_with_tls` accepts an
# optional `rustls::ClientConfig` so integration tests can inject a
# dangerous (skip-verify) verifier. Production callers pass `None`.
# default-features = false because we don't construct a ClientConfig
# here — the actual crypto provider feature is selected by the binary
# (mailrs-server enables ring via mailrs-smtp-client).
rustls = { version = "0.23", default-features = false }
mailrs-smtp-client = { path = "../smtp-client", version = "2" }
mailrs-dkim = { path = "../dkim", version = "3" }
mailrs-arc = { path = "../arc", version = "3" }
# Used by DkimSignConfig::sign() to parse the message's From: header
# and pick the right (d=, selector, key) tuple for multi-domain signing.
mailrs-rfc5322 = { path = "../rfc5322", version = "1" }
# Canonical RFC 5322 builder for DSN (multipart/report).
# format_dsn now constructs messages via MessageBuilder so the
# encoded-word + folding + CTE invariants stay consistent with the
# rest of the outbound path.
mailrs-mail-builder = { path = "../mail-builder", version = "1" }

# pg feature
sqlx = { workspace = true, optional = true }
redis = { workspace = true, optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
# Integration tests spin a real Postgres in a container so the `pg`
# feature paths (queue.rs SQL, pg_store.rs trait wiring) run against
# the actual db, not a mock. Required serially — see tests/common/pg.rs.
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["postgres", "redis"] }
sqlx = { workspace = true }
# Mirrors smtp-client/tests/common/mock_smtp.rs deps so the same mock
# can serve worker-integration tests end-to-end (worker → smtp-client →
# mock SMTP). Plain-text fixture deps only; TLS support is unused here
# but the file is byte-identical to smtp-client's copy to keep the
# helper drift-free across the two crates' integration suites.
rcgen = "0.14"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
tokio-rustls = "0.26"
hickory-resolver = "0.26"

[[bench]]
name = "core"
harness = false
