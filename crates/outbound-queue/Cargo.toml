[package]
name = "mailrs-outbound-queue"
version.workspace = true
edition = "2024"

[lints]
workspace = true

[dependencies]
sqlx = { workspace = true }
redis = { workspace = true }
futures-util = "0.3"
chrono = "0.4"
mailrs-smtp-client = { path = "../smtp-client" }
hickory-resolver = "0.26"
tokio = { version = "1", features = ["sync", "time"] }
tracing = "0.1"
mail-auth = "0.9"
rustls-pki-types = { version = "1", features = ["alloc"] }
