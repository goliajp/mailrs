[package]
name = "mailrs-ical-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.mailrs-ical]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "parse_calendar"
path = "fuzz_targets/parse_calendar.rs"
test = false
doc = false
bench = false

[[bin]]
name = "parse_invite"
path = "fuzz_targets/parse_invite.rs"
test = false
doc = false
bench = false
