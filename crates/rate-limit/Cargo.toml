[package]
name = "mailrs-rate-limit"
version = "1.0.4"
edition = "2024"
description = "Token-bucket rate limiting trait + in-memory reference impl. &str keys (IP / user / api-key / endpoint), unix-seconds time. Async, transport-agnostic, no protocol coupling. Standalone — bring your own storage backend."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-rate-limit"
authors = ["GOLIA K.K."]
keywords = ["rate-limiting", "throttle", "token-bucket", "smtp", "api"]
categories = ["network-programming", "asynchronous"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
dashmap = "6"
# Fast monotonic clock — returns raw u64 nanos without going through
# `Duration` (saves ~3-5 ns per check vs `std::time::Instant`). MIT-
# licensed, same crate `governor` uses for the same reason.
quanta = "0.12"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
governor = "0.10"

[[bench]]
name = "store"
harness = false

[[bench]]
name = "compare_governor"
harness = false
