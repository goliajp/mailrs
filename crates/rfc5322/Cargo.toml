[package]
name = "mailrs-rfc5322"
version = "1.0.1"
edition = "2024"
description = "Pull-based RFC 5322 message parser — lazy header lookup, byte-level scan, zero-alloc borrowed slices. Skip-ahead to the header you want without building a full Message tree."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-rfc5322"
authors = ["GOLIA K.K."]
keywords = ["email", "rfc5322", "parser", "smtp", "lazy"]
categories = ["email", "parsing", "no-std::no-alloc"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
# Stay dep-light. RFC 5322 parsing is byte-level; this crate exists to
# NOT pull in the full mail-parser tree-builder when callers only need
# a few headers. The one dep is `memchr`, which we use for SIMD-anchored
# CRLF scans inside the header walker (the previous `.iter().position`
# loop was the dominant cost per header line).
memchr = "2"

[dev-dependencies]
mail-parser = "0.11"  # for comparison benches only
criterion = { workspace = true }
proptest = "1"

[[bench]]
name = "parse"
harness = false
