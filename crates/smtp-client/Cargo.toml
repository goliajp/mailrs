[package]
name = "mailrs-smtp-client"
version = "2.0.1"
edition = "2024"
description = "Outbound SMTP client: MX resolution, DANE/STARTTLS, response parsing — async, transport-agnostic primitives for RFC 5321 senders."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-smtp-client"
authors = ["GOLIA K.K."]
keywords = ["smtp", "client", "mx", "dane", "email"]
categories = ["email", "network-programming", "asynchronous"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
tokio = { version = "1", features = ["net", "io-util", "time"] }
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
webpki-roots = "1"
hickory-resolver = "0.26"
sha2 = "0.11.0"
# Inline-short-string for SmtpResponse.lines — EHLO extensions and
# typical reply text both fit the 24-byte inline buffer.
compact_str = "0.9"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "io-util", "net", "time"] }
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
# Server-side TLS for STARTTLS-success path coverage. `rcgen` generates
# an ephemeral self-signed cert per test; the mock server uses
# `tokio-rustls` as the server-side handshake driver (the same TLS
# stack the production client uses, just configured for the listening
# end). Both are dev-only.
rcgen = "0.14"

[[bench]]
name = "parse"
harness = false
