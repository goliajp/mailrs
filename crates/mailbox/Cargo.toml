[package]
name = "mailrs-mailbox"
version = "1.0.3"
edition = "2024"
description = "Mailbox metadata storage abstraction for Rust IMAP/JMAP servers: MailboxStore trait + PostgreSQL reference impl + in-memory test fixture. CONDSTORE, threading, flag ops, change tracking."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-mailbox"
authors = ["GOLIA K.K."]
keywords = ["email", "mailbox", "imap", "postgres", "storage"]
categories = ["email", "database"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
sqlx = { workspace = true }
spg-sqlx = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
async-trait = "0.1"
memchr = "2"
mailrs-maildir = { path = "../storage-maildir", version = "1" }

[features]
# Swap the storage backend from PostgreSQL (default) to spg-embedded
# (in-process SQL engine, PG dialect). Type-alias level switch: the
# public API keeps one pool type (`BackendPool`); which concrete pool
# it is gets decided at build time.
spg = ["dep:spg-sqlx"]

[dev-dependencies]
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
tempfile = "3.27.0"
testcontainers = "0.27"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[[bench]]
name = "threading"
harness = false

[[bench]]
name = "store_ops"
harness = false
