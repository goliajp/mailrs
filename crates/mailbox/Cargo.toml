[package]
name = "mailrs-mailbox"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"
description = "Mailbox metadata layer: PostgreSQL-backed message/thread store, flag operations, conversation views, and email-analysis projections for IMAP/JMAP servers."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-mailbox"
authors = ["GOLIA K.K."]
keywords = ["email", "mailbox", "imap", "postgres", "storage"]
categories = ["email", "database"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
sqlx = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
mailrs-maildir = "1"
