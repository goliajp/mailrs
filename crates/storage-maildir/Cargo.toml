[package]
name = "mailrs-maildir"
version = "1.0.2"
edition = "2024"
description = "Maildir filesystem-format primitives: atomic delivery, directory scans, flag parsing — no IMAP/POP3 layer."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-maildir"
authors = ["GOLIA K.K."]
keywords = ["maildir", "email", "storage", "filesystem", "mailbox"]
categories = ["email", "filesystem"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
hostname = "0.4"

[dev-dependencies]
filetime = "0.2"
tempfile = "3"
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "flags"
harness = false
