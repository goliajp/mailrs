[package]
name = "mailrs-maildir"
version = "1.2.0"
edition = "2024"
description = "Maildir filesystem-format primitives: atomic delivery, directory scans, flag parsing — no IMAP/POP3 layer."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-maildir"
authors = ["GOLIA K.K."]
keywords = ["maildir", "email", "storage", "filesystem", "mailbox"]
categories = ["email", "filesystem"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
hostname = "0.4"
# Sharded HashMap for the per-path "have we ensured this Maildir's
# tmp/new/cur exist?" cache. See `Maildir::create_cached`. DashMap
# is the standard Rust choice for cheap-read+rare-write maps in a
# multi-threaded async setting; sharded internally, no global lock.
dashmap = "6"

[dev-dependencies]
filetime = "0.2"
tempfile = "3"
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "flags"
harness = false

[[bench]]
name = "deliver"
harness = false
