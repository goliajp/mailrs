[package]
name = "mailrs-server"
version.workspace = true
edition = "2024"
license = "Apache-2.0 OR MIT"
description = "mailrs server binary — wires SMTP / IMAP / POP3 / JMAP / ManageSieve / CalDAV / CardDAV / OIDC / web stack + 41 mailrs-* stones into a deployable mail server. Not published to crates.io (cement)."
publish = false

[lints]
workspace = true

[features]
# By default the server builds without the headless-Chrome
# render-preview backend — saves ~1 MiB of binary (chromiumoxide +
# chromiumoxide_cdp). Enable with `--features render-preview` (or via
# release.sh, which passes it) when you need the
# /api/mail/render-preview endpoint. The feature is purely additive;
# disabling it just turns the RPC into a "feature not enabled" error.
default = []
render-preview = ["dep:chromiumoxide"]
# Swap the SQL backend from PostgreSQL (default) to spg-embedded —
# the in-process engine; no postgres container, no TCP. Flips the
# BackendPool type alias in this crate AND in every sqlx-using stone.
# See .claude/rfcs/20260610-spg-embedded-cutover.md.
spg = [
    "dep:spg-sqlx",
    "dep:spg-embedded",
    "mailrs-mailbox/spg",
    "mailrs-outbound-queue/spg",
    "mailrs-shield/spg",
    "mailrs-dmarc/spg",
]
# Experimental: expose the mailrs-core-api wire surface from this monolith
# so webapi/sender clients can talk to it as if it were the eventual
# `mailrs-core` binary. Default OFF — production builds (without this
# feature) are byte-identical to the pre-Phase-2 monolith. See
# .claude/notes/arch-split-plus-fastcore-checklist-2026-06-30.md §2.
core-rpc = ["dep:mailrs-core-api", "dep:mailrs-core-sidestate"]

[dependencies]
mailrs-smtp-proto = "1"
mailrs-maildir = { path = "../storage-maildir", version = "1.2" }
mailrs-delivery-executor = { path = "../delivery-executor", version = "1.2" }
mailrs-message-store = { path = "../message-store" }
mailrs-receiver = { path = "../receiver" }
mailrs-core = { path = "../core" }
mailrs-mmalloc = { path = "../mailrs-mmalloc" }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "tls12", "std"] }
rustls-pki-types = { version = "1", features = ["std", "alloc"] }
bytes = "1"
memchr = "2"
futures-util = { version = "0.3", features = ["sink"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
rrule = "0.14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
axum = { version = "0.8", features = ["ws", "multipart"] }
tower-http = { version = "0.6", features = ["cors", "fs", "trace"] }
dashmap = "6"
mailrs-smtp-client = { path = "../smtp-client", version = "2" }
mailrs-smtp-codec = "1"
mailrs-imap-codec = "1"
mailrs-imap-format = "1"
mailrs-attachment-extract = "1"
mailrs-sieve = { path = "../sieve", version = "2" }
mailrs-outbound-queue = { path = "../outbound-queue", version = "4" }
mailrs-imap-proto = "1"
mailrs-ical = { path = "../ical", version = "2" }
mailrs-intelligence = { path = "../intelligence", version = "3" }
mailrs-mailbox = { path = "../mailbox", version = "1" }
mailrs-alias-store = { path = "../alias-store" }
mailrs-alias-store-net = { path = "../alias-store-net" }
# Optional — pulled in by the `core-rpc` feature only.
mailrs-core-api = { path = "../core-api", optional = true, features = ["server"] }
mailrs-core-sidestate = { path = "../core-sidestate", optional = true }
mailrs-jmap = "1"
mailrs-dav = "1"
async-trait = "0.1"
mailrs-postmaster = { path = "../postmaster", version = "1" }
mailrs-shield = { path = "../shield", version = "3" }
mailrs-clean = "1"
mailrs-dmarc = { path = "../dmarc", version = "2" }
mailrs-inbound = { path = "../inbound", version = "1" }
mailrs-rate-limit = "1"
mailrs-rfc5322 = "1"
mailrs-rfc2047 = "1"
mailrs-mail-builder = "1"
mailrs-auth-guard = { path = "../auth-guard", version = "2" }
mailrs-srs = "1"
mailrs-rfc2231 = "1"
mailrs-webhook-signature = "1"
mailrs-clamav = "1"
mailrs-backoff = "1"
mailrs-tls-reload = "1"
mailrs-acme = "1"
mailrs-spf = { path = "../spf", version = "2" }
mailrs-dkim = { path = "../dkim", version = "3" }
mailrs-arc = { path = "../arc", version = "3" }
mailrs-arf = "1"
mailrs-tls-rpt = "1.2"
mailrs-mime = { path = "../mime", version = "2" }
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.18", default-features = false }
sqlx = { workspace = true }
spg-sqlx = { workspace = true, optional = true }
spg-embedded = { workspace = true, optional = true }
kevy-embedded = { workspace = true }
kevy-client = { workspace = true }
ipnet = { workspace = true }
hickory-resolver = "0.26"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
argon2 = { workspace = true }
password-hash = { workspace = true }
rand_core = { workspace = true }
urlencoding = "2"
url = "2"
base64 = "0.22"
instant-acme = { version = "0.8", features = ["rcgen"] }
arc-swap = "1"
x509-parser = "0.18"
flate2 = "1"
reqwest = { version = "0.13", default-features = false, features = ["json", "form", "rustls"] }
html2text = "0.17"
mime_guess = "2"
pdf-extract = "0.10"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "tiff"] }
sha2 = "0.11"
hmac = "0.13"
hex = "0.4"
tempfile = "3"
rmcp = { version = "1.7", features = ["server", "macros", "transport-streamable-http-server", "schemars"] }
schemars = "1"
uuid = { version = "1.23.1", features = ["v4"] }
totp-rs = { version = "5.7.1", features = ["otpauth"] }
data-encoding = "2.11.0"
chromiumoxide = { version = "0.9", default-features = false, optional = true }
jsonwebtoken = { version = "10", default-features = false, features = ["aws_lc_rs", "use_pem"] }
rsa = { version = "0.9", features = ["pem"] }

[dev-dependencies]
# Receiving-path e2e regression baseline (tests/e2e_receiving.rs) spins up
# a real pgvector container — same image + version the mailbox crate's
# fixtures use. Pre-pulled in CI's test.yml. tokio / sqlx / tempfile /
# mailrs-maildir come from [dependencies] (available to integration tests).
testcontainers = "0.27"
mailrs-core-api = { path = "../core-api", features = ["client", "server"] }
# cross-backend sync test (core_rpc pg_core_tests): spawn a kevy fastcore
# alongside the spg pg-core and run mailrs-core-sync between them.
mailrs-fastcore = { path = "../fastcore" }
mailrs-mailbox-kevy = { path = "../mailbox-kevy" }
mailrs-core-sync = { path = "../core-sync" }
kevy-embedded = { workspace = true }

# Network-driven SMTP load bench — substantiates / refutes the
# "+10-20% throughput" claim from commit 9f21e0b (perf-first release
# profile). Custom harness because the bench drives real TCP sessions
# over localhost; criterion's iter model doesn't fit. See
# benches/smtp_load.rs for full rationale.
[[bench]]
name = "smtp_load"
harness = false
path = "benches/smtp_load.rs"
