[package]
name = "mailrs-server"
version.workspace = true
edition = "2024"
license = "Apache-2.0 OR MIT"
description = "mailrs server binary — wires SMTP / IMAP / POP3 / JMAP / ManageSieve / CalDAV / CardDAV / OIDC / web stack + 41 mailrs-* stones into a deployable mail server. Not published to crates.io (cement)."
publish = false

[lints]
workspace = true

[dependencies]
mailrs-smtp-proto = "1"
mailrs-maildir = { path = "../storage-maildir", version = "1.2" }
mailrs-delivery-executor = "1.1"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "tls12", "std"] }
rustls-pki-types = { version = "1", features = ["std", "alloc"] }
bytes = "1"
memchr = "2"
futures-util = { version = "0.3", features = ["sink"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
rrule = "0.14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
axum = { version = "0.8", features = ["ws", "multipart"] }
tower-http = { version = "0.6", features = ["cors", "fs", "trace"] }
dashmap = "6"
mailrs-smtp-client = { path = "../smtp-client", version = "2" }
mailrs-smtp-codec = "1"
mailrs-imap-codec = "1"
mailrs-imap-format = "1"
mailrs-attachment-extract = "1"
mailrs-sieve = "1"
mailrs-outbound-queue = { path = "../outbound-queue", version = "1.3" }
mailrs-imap-proto = "1"
mailrs-ical = { path = "../ical", version = "2" }
mailrs-intelligence = "1"
mailrs-mailbox = { path = "../mailbox", version = "1" }
mailrs-jmap = "1"
mailrs-dav = "1"
async-trait = "0.1"
mailrs-postmaster = "1"
mailrs-shield = "1"
mailrs-clean = "1"
mailrs-dmarc = { path = "../dmarc", version = "2" }
mailrs-inbound = "1"
mailrs-rate-limit = "1"
mailrs-rfc5322 = "1"
mailrs-rfc2047 = "1"
mailrs-auth-guard = "1"
mailrs-srs = "1"
mailrs-rfc2231 = "1"
mailrs-webhook-signature = "1"
mailrs-clamav = "1"
mailrs-backoff = "1"
mailrs-tls-reload = "1"
mailrs-acme = "1"
mailrs-spf = { path = "../spf", version = "2" }
mailrs-dkim = { path = "../dkim", version = "2" }
mailrs-arc = { path = "../arc", version = "2" }
mailrs-arf = "1"
mailrs-tls-rpt = "1.2"
mailrs-mime = { path = "../mime", version = "2" }
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.18", default-features = false }
sqlx = { workspace = true }
redis = { workspace = true }
hickory-resolver = "0.26"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
mail-auth = "0.9"
argon2 = "0.5"
# password-hash + rand_core pinned to older majors — argon2 0.5.x (latest)
# hard-deps password-hash 0.5, and rsa 0.9.x (latest) hard-deps rand_core 0.6.
# Unpin when argon2 0.6 / rsa 0.10 publish. See rust-deps-and-warnings.md §6.
password-hash = "0.5"
rand_core = { version = "0.6", features = ["std"] }
mail-parser = "0.11"
urlencoding = "2"
url = "2"
base64 = "0.22"
instant-acme = { version = "0.8", features = ["rcgen"] }
arc-swap = "1"
x509-parser = "0.18"
sieve-rs = "0.7"
flate2 = "1"
reqwest = { version = "0.13", default-features = false, features = ["json", "form", "rustls"] }
html2text = "0.17"
mime_guess = "2"
pdf-extract = "0.10"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "tiff"] }
sha2 = "0.11"
hmac = "0.13"
hex = "0.4"
tempfile = "3"
rmcp = { version = "1.7", features = ["server", "macros", "transport-streamable-http-server", "schemars"] }
schemars = "1"
uuid = { version = "1.23.1", features = ["v4"] }
totp-rs = { version = "5.7.1", features = ["otpauth"] }
data-encoding = "2.11.0"
ldap3 = { version = "0.12.1", default-features = false, features = ["tls-rustls-ring"] }
chromiumoxide = { version = "0.9", default-features = false }
jsonwebtoken = { version = "10", default-features = false, features = ["aws_lc_rs", "use_pem"] }
rsa = { version = "0.9", features = ["pem"] }

# Network-driven SMTP load bench — substantiates / refutes the
# "+10-20% throughput" claim from commit 9f21e0b (perf-first release
# profile). Custom harness because the bench drives real TCP sessions
# over localhost; criterion's iter model doesn't fit. See
# benches/smtp_load.rs for full rationale.
[[bench]]
name = "smtp_load"
harness = false
path = "benches/smtp_load.rs"
