[package]
name = "mailrs-smtp-proto-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.mailrs-smtp-proto]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "parse_command"
path = "fuzz_targets/parse_command.rs"
test = false
doc = false
bench = false

[[bin]]
name = "session"
path = "fuzz_targets/session.rs"
test = false
doc = false
bench = false
