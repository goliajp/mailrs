[package]
name = "mailrs-sieve"
version = "2.0.0"
edition = "2024"
description = "Clean delivery-action wrapper over the native `mailrs-sieve-core` RFC 5228 Sieve engine (Apache-2.0 OR MIT, no AGPL). Flattens the engine's structured action stream into one `SieveAction { Keep, FileInto, Discard, Redirect, Reject, Vacation }` enum the caller pattern-matches in its delivery loop, with imap4flags carry-through and caller-owned vacation (engine emits parsed parameters; the caller builds + dedups the reply)."
license = "Apache-2.0 OR MIT"
repository = "https://github.com/goliajp/mailrs"
homepage = "https://github.com/goliajp/mailrs"
documentation = "https://docs.rs/mailrs-sieve"
authors = ["GOLIA K.K."]
keywords = ["sieve", "rfc5228", "email", "filter", "delivery"]
categories = ["email", "filesystem"]
readme = "README.md"

[lints]
workspace = true

[dependencies]
mailrs-sieve-core = { path = "../sieve-core", version = "0.2" }

[[bench]]
name = "sieve"
harness = false

[dev-dependencies]
criterion = { workspace = true }
