[package]
name = "mailrs-tls-rpt-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.mailrs-tls-rpt]
path = ".."

[dependencies.serde_json]
version = "1"

[profile.release]
debug = 1

[[bin]]
name = "parse_record"
path = "fuzz_targets/parse_record.rs"
test = false
doc = false
bench = false

[[bin]]
name = "parse_report"
path = "fuzz_targets/parse_report.rs"
test = false
doc = false
bench = false
