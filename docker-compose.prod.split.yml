# docker-compose.prod.split.yml — prod deployment, RECEIVER-SPLIT topology
#
# Three roles from one ghcr:<version> image, replacing the monolith `mailrs`
# container. Shared mailrs-data volume holds spg + maildir + the new spool.
#
#   mailrs-receiver  public SMTP 25/587/465; antispam + anti via kevy;
#                    writes /data/.spool, emits SpoolDelivered. Zero spg.
#   mailrs-kevy      network kevy: shared anti + cross-process notify.
#   mailrs (core)    MAILRS_RECEIVER_SPLIT=1: consumes the spool, owns spg +
#                    embedded kevy + web/imap/pop3/managesieve. No public
#                    SMTP ports (receiver owns them).
#
# release.yml scp's this file to t02:/apps/mailrs/docker-compose.yml.
# Revert to monolith: restore docker-compose.prod.yml as the target.

services:
  chromium:
    container_name: mailrs-chromium
    image: zenika/alpine-chrome:124
    command: ["--no-sandbox", "--remote-debugging-address=0.0.0.0", "--remote-debugging-port=9222", "--disable-gpu", "--headless"]
    ports:
      - "9222:9222"
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  meilisearch:
    container_name: mailrs-meilisearch
    image: getmeili/meilisearch:v1.44
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MAILRS_MEILI_KEY:-mailrs-meili-key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # shared network kevy: anti state + cross-process SpoolDelivered notify.
  # Not exposed to host — only receiver + core reach it over compose net.
  # Its loss is non-fatal: anti fails open and core's spool reconcile
  # sweep still drains everything (notify is the fast path).
  kevy-server:
    container_name: mailrs-kevy
    image: ghcr.io/goliajp/kevy:latest
    mem_limit: 1g
    environment:
      KEVY_PORT: "6379"
      KEVY_AOF: "1"
      KEVY_DIR: /data
    volumes:
      - kevy-server-data:/data
    healthcheck:
      test: ["CMD", "kevy-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

  # public mail front door. Accepts + spools; never touches spg.
  # Survives any core outage (spg pool exhaust / OOM / restart).
  receiver:
    container_name: mailrs-receiver
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    entrypoint: ["mailrs-receiver"]
    pull_policy: always
    mem_limit: 2g
    # receiver runs no web server (port 3100 is core-only); disable the
    # image's default curl :3100 healthcheck. Liveness = SMTP listener +
    # restart policy.
    healthcheck:
      disable: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    environment:
      MAILRS_HOSTNAME: ${MAILRS_HOSTNAME:-mx.example.com}
      MAILRS_SPOOL_ROOT: /data/.spool
      MAILRS_KEVY_URL: kevy://kevy-server:6379
      MAILRS_LOCAL_DOMAINS: ${MAILRS_LOCAL_DOMAINS:-example.com}
      MAILRS_PORT: "25"
      MAILRS_SUBMISSION_PORT: "587"
      MAILRS_SMTPS_PORT: "465"
      MAILRS_ANTISPAM_ENABLED: "${MAILRS_ANTISPAM_ENABLED:-true}"
      MAILRS_TLS_CERT: /certs/fullchain.pem
      MAILRS_TLS_KEY: /certs/privkey.pem
      MAILRS_USERS_FILE: /data/users.toml
    volumes:
      - mailrs-data:/data
      - ./certs:/certs:ro
    depends_on:
      - kevy-server
    restart: unless-stopped

  # core / consumer. Container name stays `mailrs` so release.yml's
  # `docker compose logs mailrs` + chown ops keep working without edits.
  mailrs:
    container_name: mailrs
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    pull_policy: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # public SMTP ports owned by the receiver. Core keeps non-receiving
    # listeners + web only.
    ports:
      - "110:110"
      - "143:143"
      - "993:993"
      - "995:995"
      - "3100:3100"
      - "4190:4190"
    environment:
      MAILRS_HOSTNAME: ${MAILRS_HOSTNAME:-mx.example.com}
      MAILRS_MAILDIR: /data/maildir
      # spg-embedded — in-process SQL engine.
      MAILRS_PG_URL: spg:///data/spg/mailrs.spg
      MAILRS_SPG_FORCE_UNLOCK: "true"
      SPG_PITR_RETENTION_HOURS: "24"
      # spg-embedded 7.34: row-level WAL redo (flag-gated). Cuts crash
      # recovery from O(N x base_rows) statement replay to O(N) physical
      # apply (~242x in the 24k-row probe). Default off in spg; we opt in
      # after staging soak.
      SPG_WAL_ROW_REDO: "1"
      # core role under split: drain the receiver's spool.
      MAILRS_RECEIVER_SPLIT: "1"
      MAILRS_SPOOL_ROOT: /data/.spool
      # connect the same network kevy so the SpoolDelivered notify bridge
      # re-injects the receiver's events into this process's bus.
      MAILRS_KEVY_URL: kevy://kevy-server:6379
      # core also keeps its embedded kevy for outbound-queue notify /
      # spam cache / cache-bust — independent of the shared network kevy.
      MAILRS_KEVY_DATA_DIR: /data/kevy
      MAILRS_WEB_STATIC_DIR: /opt/mailrs/web
      MAILRS_LOCAL_DOMAINS: ${MAILRS_LOCAL_DOMAINS:-example.com}
      MAILRS_TLS_CERT: /certs/fullchain.pem
      MAILRS_TLS_KEY: /certs/privkey.pem
      MAILRS_USERS_FILE: /data/users.toml
      MAILRS_DKIM_SELECTOR: ${MAILRS_DKIM_SELECTOR:-}
      MAILRS_DKIM_DOMAIN: ${MAILRS_DKIM_DOMAIN:-}
      MAILRS_DKIM_PRIVATE_KEY: ${MAILRS_DKIM_PRIVATE_KEY:-}
      MAILRS_ACME_EMAIL: ${MAILRS_ACME_EMAIL:-}
      MAILRS_ACME_DOMAINS: ${MAILRS_ACME_DOMAINS:-}
      MAILRS_ACME_DIR: /data/acme
      MAILRS_ACME_STAGING: ${MAILRS_ACME_STAGING:-false}
      MAILRS_AI_ANALYSIS_ENABLED: "${MAILRS_AI_ANALYSIS_ENABLED:-false}"
      MAILRS_LLM_URL: "${MAILRS_LLM_URL:-}"
      MAILRS_LLM_API_KEY: "${MAILRS_LLM_API_KEY:-}"
      MAILRS_ANTISPAM_ENABLED: "${MAILRS_ANTISPAM_ENABLED:-true}"
      MAILRS_MEILI_URL: http://meilisearch:7700
      MAILRS_MEILI_KEY: ${MAILRS_MEILI_KEY:-mailrs-meili-key}
      MAILRS_CHROME_CDP_URL: ws://chromium:9222
      MAILRS_WEBHOOK_URL: "${MAILRS_WEBHOOK_URL:-}"
      MAILRS_WEBHOOK_API_KEY: "${MAILRS_WEBHOOK_API_KEY:-}"
    volumes:
      - mailrs-data:/data
      - ./certs:/certs:ro
      - ./web:/opt/mailrs/web:ro
      - ./dkim:/dkim:ro
    depends_on:
      - kevy-server
    restart: unless-stopped

volumes:
  mailrs-data:
  meili-data:
  kevy-server-data:
