[workspace.package]
version = "1.6.21"

[workspace]
resolver = "2"
members = [
    "crates/smtp-proto",
    "crates/storage-maildir",
    "crates/smtp-client",
    "crates/outbound-queue",
    "crates/mailbox",
    "crates/imap-proto",
    "crates/ical",
    "crates/intelligence",
    "crates/clean",
    "crates/postmaster",
    "crates/shield",
    "crates/server",
]

[workspace.dependencies]
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "postgres", "macros", "chrono"] }
redis = { version = "1", features = ["tokio-comp", "connection-manager"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
all = { level = "deny" }
