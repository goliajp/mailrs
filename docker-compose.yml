services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: mailrs
      POSTGRES_USER: mailrs
      POSTGRES_PASSWORD: ${MAILRS_PG_PASSWORD:-mailrs}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql
      - ./scripts/init-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    restart: unless-stopped

  mailrs:
    build: .
    ports:
      - "25:25"
      - "80:80"
      - "587:587"
      - "465:465"
      - "143:143"
      - "3100:3100"
    depends_on:
      - postgres
      - valkey
    environment:
      MAILRS_HOSTNAME: ${MAILRS_HOSTNAME:-mx.example.com}
      MAILRS_MAILDIR: /data/maildir
      MAILRS_PG_URL: postgres://mailrs:${MAILRS_PG_PASSWORD:-mailrs}@postgres:5432/mailrs
      MAILRS_VALKEY_URL: redis://valkey:6379
      MAILRS_WEB_STATIC_DIR: /opt/mailrs/web
      MAILRS_LOCAL_DOMAINS: ${MAILRS_LOCAL_DOMAINS:-example.com}
      MAILRS_TLS_CERT: /certs/fullchain.pem
      MAILRS_TLS_KEY: /certs/privkey.pem
      MAILRS_USERS_FILE: /data/users.toml
      MAILRS_DKIM_SELECTOR: ${MAILRS_DKIM_SELECTOR:-}
      MAILRS_DKIM_DOMAIN: ${MAILRS_DKIM_DOMAIN:-}
      MAILRS_DKIM_PRIVATE_KEY: ${MAILRS_DKIM_PRIVATE_KEY:-}
      MAILRS_ACME_EMAIL: ${MAILRS_ACME_EMAIL:-}
      MAILRS_ACME_DOMAINS: ${MAILRS_ACME_DOMAINS:-}
      MAILRS_ACME_DIR: /data/acme
      MAILRS_ACME_STAGING: ${MAILRS_ACME_STAGING:-false}
    volumes:
      - mailrs-data:/data
      - ./certs:/certs:ro
    restart: unless-stopped

volumes:
  mailrs-data:
  pg-data:
  valkey-data:
