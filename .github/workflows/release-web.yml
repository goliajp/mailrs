name: release-web

# Webapp-only release, decoupled from the Rust binary version.
#
# Triggered by pushing a `web-v*` tag. Skips cargo entirely, skips docker
# image rebuild, skips container restart. Runs web tests, builds web/dist,
# rsyncs it to host's bind-mount target. The container's tower_http
# ServeDir reads files off disk, so the change is live on next request.
#
# Tag scheme: `web-v<YYYY.MM.DD>-<seq>` (e.g. `web-v2026.06.08-1`). Date
# + seq lets multiple web-only releases land on the same day without
# colliding with the Rust binary's `v<X.Y.Z>` SemVer.
#
# Developer flow:
#   git flow release start web-v2026.06.08-1
#   GIT_MERGE_AUTOEDIT=no git flow release finish -p -m "Web release" web-v2026.06.08-1

on:
  push:
    tags:
      - 'web-v*'

jobs:
  gate:
    name: bun check + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun run check (tsc + eslint + prettier)
        run: bun run check

      - name: bun run test
        run: bun run test

  build:
    name: vite build
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: vite build
        # vite output doesn't embed package.json version (we removed
        # __MAILRS_VERSION__ define earlier), so no need to patch it.
        run: bunx --bun tsc -b && bunx --bun vite build

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: deploy web to prod
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: download dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - name: prepare ssh key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Compose sync: web-v* lane does NOT touch compose. The v1.9 fastcore
      # stack (canonical `deploy/docker-compose.prod.yml`, shipped by
      # release.yml on every v* tag) bind-mounts /apps/mailrs/web into
      # webapi-fc read-only — the container's ServeDir reads disk on
      # every request, so an rsync into /apps/mailrs/web/ takes effect
      # immediately without any container restart.
      #
      # If a web release genuinely needs a compose change (new bind
      # mount, new env), that's a v* release, not a web-v*. The legacy
      # `scp + up -d mailrs` step used to target the pre-fastcore monolith
      # service `mailrs`, which doesn't exist in the fastcore compose —
      # every recent web-v* release ran it as a silent no-op. Removed
      # for clarity in v2 Stage A.

      - name: rsync dist to prod
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            web-dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/apps/mailrs/web/"

      - name: post-deploy bundle check
        run: |
          # Read the bundle hash vite emitted, then ask the container
          # (via ssh-to-host) to serve it from its own ServeDir. If the
          # bind mount went stale or rsync hit the wrong path, the
          # container falls back to SPA (text/html) and this fails —
          # before the user discovers it via the browser.
          #
          # SSH_HOST is the deploy target, not the public HTTPS hostname,
          # so we hit the in-container port over loopback rather than
          # public 443 (which has a different cert / SNI).
          BUNDLE=$(grep -oE 'index-[A-Za-z0-9_-]+\.js' web-dist/index.html | head -1)
          echo "==> verifying $BUNDLE via host localhost:3103 (webapi-fc)"
          CT=$(ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "curl -sIo /dev/null -w '%{content_type}' 'http://localhost:3103/assets/$BUNDLE'")
          echo "==> content-type: $CT"
          case "$CT" in
            application/javascript*|text/javascript*) echo "==> bundle served — deploy ok" ;;
            *) echo "==> ERROR: bundle not served (got '$CT'). Bind mount likely inactive on host." >&2; exit 1 ;;
          esac

      - name: post-deploy health check
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'curl -sS --max-time 5 http://localhost:3103/api/health | python3 -c "import json,sys;print(json.load(sys.stdin).get(\"status\",\"?\"))"'

  publish:
    name: announce web release
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
