name: release

# Triggered by pushing a `v<semver>` tag (matches the scheme used by
# scripts/release.sh + scripts/bump.sh). Runs the same gate as the test
# workflow, then builds + pushes the multi-stage Docker image to GHCR
# under `ghcr.io/<owner>/mailrs:<version>`.
#
# Remote deployment (pulling the new image + docker-compose up) is NOT
# triggered here yet — that's the v5.3 cutover step. Until then,
# `scripts/release.sh` keeps doing the deploy and CI just builds the
# image as a parallel artifact.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: cargo test + web check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: pre-pull testcontainer images (retry against Docker Hub flake)
        # Mirror of test.yml — see comment there for the 2026-06-03
        # registry-1.docker.io timeout incident that motivated this.
        run: |
          set -e
          for img in pgvector/pgvector:pg18 axllent/mailpit:latest; do
            ok=0
            for i in 1 2 3 4 5; do
              if docker pull "$img"; then ok=1; break; fi
              echo "::warning::docker pull $img attempt $i failed, retrying in 15s"
              sleep 15
            done
            [ "$ok" = 1 ] || { echo "::error::docker pull $img failed after 5 attempts"; exit 1; }
          done

      - name: cargo test --workspace (skip perf_gates — CI noise)
        # See test.yml comment — *_under_budget budgets are M-series-
        # calibrated, ubuntu CI runners are too slow + variable.
        run: cargo test --workspace --no-fail-fast -- --skip _under_budget

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        working-directory: web
        run: bun install --frozen-lockfile

      - name: bun run check
        working-directory: web
        run: bun run check

      - name: bun run test
        working-directory: web
        run: bun run test

  # Multi-arch build via native runners (no QEMU). amd64 → ubuntu-latest,
  # arm64 → ubuntu-24.04-arm (GitHub-hosted, free for public repos). Each
  # matrix leg builds + pushes by digest; the `manifest` job below merges
  # the two digests into a single multi-arch tag.
  #
  # History: v1.7.31 tried docker buildx multi-arch with QEMU emulation on
  # a single ubuntu-latest runner; arm64 emulation took >1h and timed out.
  # Native runners do each arch in ~10-15 min and run in parallel.
  docker:
    name: docker build (${{ matrix.platform }})
    needs: gate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push by digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # Push without a tag — output is the image digest. The
          # `manifest` job below collects per-arch digests and stamps
          # the semver tags on the combined manifest.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: merge multi-arch manifest
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(needs.docker.outputs.version, '-') }}

      - name: create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: inspect
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.version }}

  publish:
    name: announce release
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
