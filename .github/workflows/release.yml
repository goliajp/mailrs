name: release

# Triggered by pushing a `v<semver>` tag (matches the scheme used by
# scripts/release.sh + scripts/bump.sh). Runs the same gate as the test
# workflow, then builds + pushes the multi-stage Docker image to GHCR
# under `ghcr.io/<owner>/mailrs:<version>`.
#
# Remote deployment (pulling the new image + docker-compose up) is NOT
# triggered here yet — that's the v5.3 cutover step. Until then,
# `scripts/release.sh` keeps doing the deploy and CI just builds the
# image as a parallel artifact.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: cargo test + web check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: pre-pull testcontainer images (retry against Docker Hub flake)
        # Mirror of test.yml — see comment there for the 2026-06-03
        # registry-1.docker.io timeout incident that motivated this.
        run: |
          set -e
          for img in pgvector/pgvector:pg18 axllent/mailpit:latest; do
            ok=0
            for i in 1 2 3 4 5; do
              if docker pull "$img"; then ok=1; break; fi
              echo "::warning::docker pull $img attempt $i failed, retrying in 15s"
              sleep 15
            done
            [ "$ok" = 1 ] || { echo "::error::docker pull $img failed after 5 attempts"; exit 1; }
          done

      - name: cargo test --workspace (skip perf_gates — CI noise)
        # See test.yml comment — *_under_budget budgets are M-series-
        # calibrated, ubuntu CI runners are too slow + variable.
        run: cargo test --workspace --no-fail-fast -- --skip _under_budget

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        working-directory: web
        run: bun install --frozen-lockfile

      - name: bun run check
        working-directory: web
        run: bun run check

      - name: bun run test
        working-directory: web
        run: bun run test

  # Multi-arch build via native runners (no QEMU). amd64 → ubuntu-latest,
  # arm64 → ubuntu-24.04-arm (GitHub-hosted, free for public repos). Each
  # matrix leg builds + pushes by digest; the `manifest` job below merges
  # the two digests into a single multi-arch tag.
  #
  # History: v1.7.31 tried docker buildx multi-arch with QEMU emulation on
  # a single ubuntu-latest runner; arm64 emulation took >1h and timed out.
  # Native runners do each arch in ~10-15 min and run in parallel.
  docker:
    name: docker build (${{ matrix.platform }})
    needs: gate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push by digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # Inject the git tag's version into Cargo.toml + package.json
          # at build time. Repo files stay at 0.0.0 — no bump commit, no
          # bump.sh, no developer ceremony beyond `git tag v<x.y.z>`.
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          # Push without a tag — output is the image digest. The
          # `manifest` job below collects per-arch digests and stamps
          # the semver tags on the combined manifest.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: merge multi-arch manifest
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(needs.docker.outputs.version, '-') }}

      - name: create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: inspect
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.version }}

  deploy:
    name: deploy to prod
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Sync the compose file to host BEFORE the SSH script runs. If the
      # compose file changed (e.g. v1.7.132 added the ./web bind mount),
      # the host needs the new YAML before `docker compose up -d`
      # otherwise the container is recreated with the OLD config and any
      # mount / env change introduced by this release is silently lost.
      - name: scp docker-compose.prod.yml
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # Destination is docker-compose.yml — the file `docker compose`
          # actually reads in /apps/mailrs. Shipping it as
          # docker-compose.prod.yml made this scp dead code: every
          # `docker compose up -d` kept reusing the host's stale
          # docker-compose.yml (caught at the v1.7.148 SPG cutover, where
          # the env/service changes silently didn't apply).
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/apps/mailrs/docker-compose.yml"

      - name: SSH + docker pull + restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # max bash; -e bails on first failure so the health check at the
          # end is the only "success" signal for the job
          script_stop: true
          script: |
            set -e
            cd /apps/mailrs

            VERSION="${{ steps.ver.outputs.version }}"
            echo "==> deploying mailrs v$VERSION"

            # 1. pull new multi-arch image (published by the manifest job above)
            docker pull ghcr.io/goliajp/mailrs:$VERSION

            # 2. bootstrap web/ from the image ONLY when host has no web yet.
            #    docker-compose.prod.yml mounts ./web → /opt/mailrs/web:ro,
            #    so the host directory is authoritative once populated. The
            #    web-v* lane (release-web.yml) is the sole channel that
            #    updates web on subsequent releases — full v* releases ship
            #    Rust only and must NOT overwrite the bind-mount source,
            #    otherwise any web-v* shipped between two v*'s gets wiped.
            #
            #    Convention: if a v* release intentionally ships web
            #    changes too, cut a `web-v…` tag alongside it.
            mkdir -p web
            if [ ! -f web/index.html ]; then
              echo "==> host web/ empty — bootstrapping from image baked-in copy"
              docker create --name mailrs-web-tmp ghcr.io/goliajp/mailrs:$VERSION
              docker cp mailrs-web-tmp:/opt/mailrs/web/. web/
              docker rm mailrs-web-tmp
            else
              echo "==> host web/ already populated — leaving it alone (web ships via web-v* lane)"
            fi

            # 3. pin the version in .env so docker-compose picks the new tag
            if grep -q '^MAILRS_VERSION=' .env; then
              sed -i "s|^MAILRS_VERSION=.*|MAILRS_VERSION=$VERSION|" .env
            else
              echo "MAILRS_VERSION=$VERSION" >> .env
            fi

            # 4. align bind-mounted secret + data-volume ownership to UID 10001.
            #    The image runs as USER mailrs (UID 10001); without this chown
            #    the container can't read host-bound certs or write to /data.
            chown -R 10001:10001 certs/ 2>/dev/null || true
            docker run --rm -v mailrs_mailrs-data:/data alpine \
              chown -R 10001:10001 /data

            # 5. restart with the new image tag
            docker compose up -d --remove-orphans

            # 6. health gate — poll /api/health until healthy or 60s timeout.
            # `health` not `status` because prod root shell is zsh; `$status`
            # is a read-only special parameter there (equivalent to bash's $?).
            for i in $(seq 1 30); do
              health=$(curl -sS --max-time 5 http://localhost:3100/api/health 2>/dev/null \
                | python3 -c "import json,sys;print(json.load(sys.stdin).get('status','?'))" \
                2>/dev/null || echo "unreachable")
              case "$health" in
                healthy|degraded)
                  echo "==> health: $health — deploy ok"
                  exit 0
                  ;;
              esac
              sleep 2
            done

            echo "==> deploy failed; container logs (tail 40):" >&2
            docker compose logs --tail 40 mailrs >&2 || true
            exit 1

  publish:
    name: announce release
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
