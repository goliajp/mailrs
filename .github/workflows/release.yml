name: release

# Triggered by pushing a `v<semver>` tag (matches the scheme used by
# scripts/release.sh + scripts/bump.sh). Runs the same gate as the test
# workflow, then builds + pushes the multi-stage Docker image to GHCR
# under `ghcr.io/<owner>/mailrs:<version>`.
#
# Remote deployment (pulling the new image + docker-compose up) is NOT
# triggered here yet — that's the v5.3 cutover step. Until then,
# `scripts/release.sh` keeps doing the deploy and CI just builds the
# image as a parallel artifact.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: cargo test + web check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace (skip perf_gates — CI noise)
        # See test.yml comment — *_under_budget budgets are M-series-
        # calibrated, ubuntu CI runners are too slow + variable.
        run: cargo test --workspace --no-fail-fast -- --skip _under_budget

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        working-directory: web
        run: bun install --frozen-lockfile

      - name: bun run check
        working-directory: web
        run: bun run check

      - name: bun run test
        working-directory: web
        run: bun run test

  docker:
    name: docker build + push (linux/amd64)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(steps.ver.outputs.version, '-') }}

      # Single arch (linux/amd64) only. v1.7.31 release exceeded the 1h
      # job timeout building multi-arch via QEMU emulation; prod (t02)
      # is deployed directly by scripts/release.sh + cargo-zigbuild, so
      # the GHCR image is a parallel artifact for community/dev users,
      # not a deploy gate. Drop arm64 to keep CI under 15 min; arm64
      # users can build locally from the published source.
      - name: build + push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: announce release
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
