name: test

# Run cargo test + bun test on every push to a git-flow branch. We don't
# use PRs (see .claude/rules/common/git-workflow.md) — branch start/finish
# is the merge path, so push triggers cover every code change.
#
# develop/master: integration + production tips
# feature/**:   in-progress feature work (off develop)
# bugfix/**:    in-progress bug fixes (off develop)
# release/**:   release candidates (off develop, into master)
# hotfix/**:    urgent prod fixes (off master, into master + develop)

on:
  push:
    branches:
      - develop
      - master
      - 'feature/**'
      - 'bugfix/**'
      - 'release/**'
      - 'hotfix/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin a single workspace target dir inside $GITHUB_WORKSPACE so the
  # actions/cache@v4 step below can prime it across runs.
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  rust:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: pre-pull testcontainer images (retry against Docker Hub flake)
        # Integration tests in mailbox / outbound-queue / mail-builder spin
        # up real `pgvector/pgvector:pg18` + `axllent/mailpit:latest`
        # containers via testcontainers. Docker Hub registry sporadically
        # times out pulls (e.g. 2026-06-03 04:27 UTC outage killed the
        # b6335f6 run). Pre-pull with retry so the test step finds the
        # images already local and never hits the Hub.
        run: |
          set -e
          for img in pgvector/pgvector:pg18 axllent/mailpit:latest; do
            ok=0
            for i in 1 2 3 4 5; do
              if docker pull "$img"; then ok=1; break; fi
              echo "::warning::docker pull $img attempt $i failed, retrying in 15s"
              sleep 15
            done
            [ "$ok" = 1 ] || { echo "::error::docker pull $img failed after 5 attempts"; exit 1; }
          done

      - name: cargo test --workspace (skip perf_gates — CI runners are too noisy)
        # Each *_under_budget test asserts wall-clock under a fixed
        # budget tuned for M-series Mac at idle. GH Actions ubuntu
        # runners are ~3× slower and have variable CPU. Skip the gates
        # here; they run locally before `scripts/release.sh` ships and
        # via `cargo bench` for trend tracking.
        run: cargo test --workspace --no-fail-fast -- --skip _under_budget

  web:
    name: web check + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun run check (tsc + eslint + prettier)
        run: bun run check

      - name: bun run test:coverage
        run: bun run test:coverage
