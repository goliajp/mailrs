name: test

# Run cargo test + bun test on every push to develop/main and every PR.
# The release workflow runs the same set on tag push, but this fires earlier
# so reviewers see the gate status before merge.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin a single workspace target dir inside $GITHUB_WORKSPACE so the
  # actions/cache@v4 step below can prime it across runs.
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  rust:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast

  web:
    name: web check + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun run check (tsc + eslint + prettier)
        run: bun run check

      - name: bun run test:coverage
        run: bun run test:coverage
