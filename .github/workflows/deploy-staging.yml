# Staging continuous deploy — every green develop ships to t01 / mail.smk.ai.
#
# Lane separation: prod = `v*` tag → t02 (release.yml). This lane = develop
# HEAD → t01 staging, so defects surface on a prod-scale mock before a prod
# release is cut.
#
# Gating: triggers via `workflow_run` AFTER the `test` workflow finishes on
# develop, and only proceeds when that run succeeded — so a red develop never
# deploys, with zero duplicated gate work.
#
# Target: the PG-backed primary (mail.smk.ai = `mailrs-staging-pg`, built from
# Dockerfile.pg, no `--features spg`). t01 is publicly reachable on :22 exactly
# like prod's t02, so this uses plain SSH (no Tailscale). The arm64 image is
# built on the runner and shipped to t01 via `docker save | ssh | docker load`
# — no ghcr dependency, no registry auth on the host.
#
# ── REQUIRED REPO SECRETS (already set) ──────────────────────────────────────
#   STAGING_SSH_HOST   t01.golia.jp  (public, → t01 EIP)
#   STAGING_SSH_USER   root
#   STAGING_SSH_KEY    private half of the ed25519 CI deploy key authorized in
#                      t01:/root/.ssh/authorized_keys (github-actions-deploy-staging)
# ─────────────────────────────────────────────────────────────────────────────

name: deploy-staging

on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: build PG image + deploy to t01
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: build PG-backend image (arm64, no --features spg)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.pg
          platforms: linux/arm64
          tags: mailrs-pg:local
          load: true
          build-args: |
            VERSION=0.0.0-develop+${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha,scope=staging-pg-arm64
          cache-to: type=gha,mode=max,scope=staging-pg-arm64

      - name: setup ssh to t01
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: ship image to t01 (save | ssh | load)
        run: |
          docker save mailrs-pg:local | gzip | \
            ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'gunzip | docker load'

      - name: redeploy mailrs-staging-pg + health gate
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'set -e
             cd /apps/mailrs-staging-pg
             docker compose -p mailrs-staging-pg -f docker-compose.pg.yml up -d mailrs
             for i in $(seq 1 36); do
               if curl -fsS --max-time 5 http://127.0.0.1:3102/api/health | grep -q "\"status\":\"healthy\""; then
                 echo "staging-pg healthy"; exit 0
               fi
               sleep 5
             done
             echo "health check failed"; docker logs --tail 50 mailrs-staging-pg; exit 1'
