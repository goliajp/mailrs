# Staging continuous deploy — every green develop ships to t01 / mail.smk.ai.
#
# Lane separation: prod = `v*` tag → t02 (release.yml). This lane = develop
# HEAD → t01 staging, same fastcore topology as prod (receiver + fastcore +
# webapi-fc + fastcore-sender), so defects surface on a prod-shape mock
# before a prod release is cut. Zero monolith since 2026-07-03.
#
# Gating: triggers via `workflow_run` AFTER the `test` workflow finishes on
# develop, proceeding only when that run succeeded — a red develop never
# deploys, zero duplicated gate work.
#
# t01 is identical to prod's t02 — public on :22, pulls the public ghcr
# image — so this mirrors release.yml exactly: build+push ghcr:develop,
# then SSH the host and `docker compose pull && up`. (The spg/PG comparison
# forks on t01 are synced on demand, not by this lane.)
#
# ── REQUIRED REPO SECRETS (already set) ──────────────────────────────────────
#   STAGING_SSH_HOST   t01.golia.jp  (public, → t01 EIP; symmetric to t02.golia.jp)
#   STAGING_SSH_USER   root
#   STAGING_SSH_KEY    private half of the ed25519 CI deploy key in
#                      t01:/root/.ssh/authorized_keys (github-actions-deploy-staging)
# GHCR push uses the built-in GITHUB_TOKEN (packages: write below).
# ─────────────────────────────────────────────────────────────────────────────

name: deploy-staging

on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: goliajp/mailrs

jobs:
  deploy:
    name: build :develop image + deploy fastcore stack to t01
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push :develop (arm64, prod-parity spg image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            VERSION=0.0.0-develop+${{ github.event.workflow_run.head_sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          push: true
          cache-from: type=gha,scope=develop-arm64
          cache-to: type=gha,mode=max,scope=develop-arm64

      - name: setup ssh to t01
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Sync the compose file before bringing services up, so any edits
      # in this commit (env changes, port maps, new sidecars) apply.
      - name: scp docker-compose.staging.yml
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            deploy/docker-compose.staging.yml \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/apps/mailrs-staging/docker-compose.staging.yml"

      # Sync the staging-stricter-than-prod self-soak harness: keep
      # /usr/local/bin/{check-staging-gate.sh,staging-soak-gate.sh}
      # and /etc/systemd/system/staging-soak-gate.service in lockstep
      # with the repo so changes to the gate land without manual scp.
      - name: scp staging-soak-gate + traffic-gen harness
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            scripts/check-staging-gate.sh scripts/staging-soak-gate.sh \
            scripts/staging-traffic-gen.sh \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/usr/local/bin/"
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            deploy/staging-soak-gate.service deploy/staging-traffic-gen.service \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/etc/systemd/system/"
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'chmod +x /usr/local/bin/check-staging-gate.sh /usr/local/bin/staging-soak-gate.sh /usr/local/bin/staging-traffic-gen.sh
             systemctl daemon-reload
             systemctl enable staging-soak-gate.service 2>/dev/null || true
             systemctl enable staging-traffic-gen.service 2>/dev/null || true'

      - name: pull + redeploy fastcore stack + health gate
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'set -e
             cd /apps/mailrs-staging
             grep -q "^MAILRS_VERSION=" .env && sed -i "s/^MAILRS_VERSION=.*/MAILRS_VERSION=develop/" .env || echo "MAILRS_VERSION=develop" >> .env
             # Pure fastcore topology — identical shape to prod. The spg
             # monolith service is gone from the compose file; the first
             # up -d --remove-orphans after the 2026-07-03 cutover reaps
             # the old mailrs-staging container (spg catalog stays in the
             # mailrs-staging-data volume, untouched).
             docker compose -p mailrs-staging -f docker-compose.staging.yml pull
             docker compose -p mailrs-staging -f docker-compose.staging.yml up -d --remove-orphans
             # health: fastcore healthz backend=kevy (:3201), webapi-fc
             # (:3103), receiver SMTP banner.
             for i in $(seq 1 36); do
               ok=1
               curl -fsS --max-time 5 http://127.0.0.1:3201/v1/healthz | grep -q "\"backend\":\"kevy\"" || { echo "waiting: fastcore healthz"; ok=0; }
               if [ "$ok" = 1 ]; then curl -fsS --max-time 5 http://127.0.0.1:3103/_health >/dev/null || { echo "waiting: webapi-fc"; ok=0; }; fi
               if [ "$ok" = 1 ]; then
                 echo "staging fastcore stack healthy"
                 if timeout 3 bash -c "exec 3<>/dev/tcp/172.31.11.182/25; head -c 3 <&3" 2>/dev/null | grep -q "^220"; then
                   echo "receiver SMTP banner ok"
                 else
                   echo "warning: receiver SMTP banner not yet (deploy still considered ok)"
                 fi
                 exit 0
               fi
               sleep 5
             done
             echo "health check failed"
             docker logs --tail 30 mailrs-staging-fastcore || true
             docker logs --tail 30 mailrs-staging-webapi-fc || true
             docker logs --tail 30 mailrs-staging-receiver || true
             exit 1'

      # Stamp the commit SHA + kick the 30-min self-soak gate. The
      # service writes a verdict to /var/run/staging-gate.json which
      # release.yml reads before allowing a prod tag through. We
      # don't `--wait` — the service runs detached for 30 min while
      # this job exits cleanly.
      - name: kick staging-soak-gate self-check
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "echo '${{ github.sha }}' > /etc/staging-deploy-sha
             systemctl reset-failed staging-traffic-gen.service 2>/dev/null || true
             systemctl restart staging-traffic-gen.service
             systemctl reset-failed staging-soak-gate.service 2>/dev/null || true
             systemctl start --no-block staging-soak-gate.service
             echo 'staging-soak-gate.service started for sha=${{ github.sha }}'"
