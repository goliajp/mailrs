# Staging continuous deploy — every green develop ships to t01 / mail.smk.ai.
#
# Lane separation: prod = `v*` tag → t02 (release.yml). This lane = develop
# HEAD → t01 staging, same spg backend as prod, so spg defects surface on a
# prod-scale mock before a prod release is cut.
#
# Gating: triggers via `workflow_run` AFTER the `test` workflow finishes on
# develop, proceeding only when that run succeeded — a red develop never
# deploys, zero duplicated gate work.
#
# Target: the spg-backed PRIMARY (mail.smk.ai = `mailrs-staging`, prod-parity
# image built from the standard Dockerfile with --features spg). t01 is
# identical to prod's t02 — public on :22, pulls the public ghcr image — so
# this mirrors release.yml exactly: build+push ghcr:develop, then SSH the host
# and `docker compose pull && up`. (The PG comparison fork `mailrs-staging-pg`
# is synced on demand, not by this lane.)
#
# ── REQUIRED REPO SECRETS (already set) ──────────────────────────────────────
#   STAGING_SSH_HOST   t01.golia.jp  (public, → t01 EIP; symmetric to t02.golia.jp)
#   STAGING_SSH_USER   root
#   STAGING_SSH_KEY    private half of the ed25519 CI deploy key in
#                      t01:/root/.ssh/authorized_keys (github-actions-deploy-staging)
# GHCR push uses the built-in GITHUB_TOKEN (packages: write below).
# ─────────────────────────────────────────────────────────────────────────────

name: deploy-staging

on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: goliajp/mailrs

jobs:
  deploy:
    name: build :develop + deploy spg primary to t01
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push :develop (arm64, prod-parity spg image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            VERSION=0.0.0-develop+${{ github.event.workflow_run.head_sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          push: true
          cache-from: type=gha,scope=develop-arm64
          cache-to: type=gha,mode=max,scope=develop-arm64

      - name: setup ssh to t01
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: pull + redeploy mailrs-staging (spg) + health gate
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'set -e
             cd /apps/mailrs-staging
             grep -q "^MAILRS_VERSION=" .env && sed -i "s/^MAILRS_VERSION=.*/MAILRS_VERSION=develop/" .env || echo "MAILRS_VERSION=develop" >> .env
             docker compose -p mailrs-staging -f docker-compose.staging.yml pull mailrs
             docker compose -p mailrs-staging -f docker-compose.staging.yml up -d mailrs
             for i in $(seq 1 36); do
               if curl -fsS --max-time 5 http://127.0.0.1:3101/api/health | grep -q "\"status\":\"healthy\""; then
                 echo "staging (spg) healthy"; exit 0
               fi
               sleep 5
             done
             echo "health check failed"; docker logs --tail 50 mailrs-staging; exit 1'
