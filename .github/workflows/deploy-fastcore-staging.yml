# Deploy the kevy-backed fastcore service to t01 staging.
#
# Triggers on:
#   - manual workflow_dispatch (one-button rollout)
#   - build-arch-image.yml completing successfully on arch/split-fastcore
#     (auto-rollout when a new arch image lands)
#
# Steps:
#   1. scp deploy/docker-compose.staging.split.yml to t01
#   2. ssh in, set MAILRS_VERSION=arch-split-fastcore in .env,
#      docker compose pull + up the `fastcore` service under
#      --profile fastcore
#   3. curl http://127.0.0.1:3201/v1/healthz expecting backend=kevy
#
# Monolith mailrs container is NOT touched. webapi shadow is NOT
# started (would need a real SECRET on the host; an operator follows
# up with --with-webapi via staging-fastcore-up.sh from their laptop
# when they want to UI-browse).
#
# Required GH secrets (already set for deploy-staging.yml):
#   STAGING_SSH_HOST   t01.golia.jp
#   STAGING_SSH_USER   root
#   STAGING_SSH_KEY    private key (root@t01)

name: deploy-fastcore-staging

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["build-arch-image"]
    types: [completed]
    branches: ["arch/split-fastcore"]

concurrency:
  group: deploy-fastcore-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy fastcore to t01
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: arch/split-fastcore

      - name: setup ssh to t01
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: scp docker-compose.staging.split.yml
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            deploy/docker-compose.staging.split.yml \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/apps/mailrs-staging/docker-compose.staging.split.yml"

      - name: pull + up fastcore (profile=fastcore)
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'set -e
             cd /apps/mailrs-staging
             # ensure MAILRS_VERSION points at the arch tag so the
             # compose pull resolves arch-split-fastcore not develop.
             if grep -q "^MAILRS_VERSION=" .env 2>/dev/null; then
                 sed -i "s/^MAILRS_VERSION=.*/MAILRS_VERSION=arch-split-fastcore/" .env
             else
                 echo "MAILRS_VERSION=arch-split-fastcore" >> .env
             fi
             docker compose -p mailrs-staging \
                 -f docker-compose.staging.split.yml \
                 --profile fastcore pull fastcore
             docker compose -p mailrs-staging \
                 -f docker-compose.staging.split.yml \
                 --profile fastcore up -d fastcore'

      - name: health gate
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            'for i in $(seq 1 24); do
                 body=$(curl -sf --max-time 3 http://127.0.0.1:3201/v1/healthz 2>/dev/null || true)
                 if echo "$body" | grep -q "\"backend\":\"kevy\""; then
                     echo "fastcore healthy: $body"
                     exit 0
                 fi
                 sleep 5
             done
             echo "::error::fastcore did not become healthy"
             docker logs --tail 50 mailrs-staging-fastcore || true
             exit 1'
