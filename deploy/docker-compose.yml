services:
  postgres:
    container_name: mailrs-postgres
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: mailrs
      POSTGRES_PASSWORD: ${MAILRS_PG_PASSWORD:-mailrs}
      POSTGRES_DB: mailrs
    volumes:
      - pg-data:/var/lib/postgresql
      - ./init-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped

  valkey:
    container_name: mailrs-valkey
    image: valkey/valkey:latest
    volumes:
      - valkey-data:/data
    restart: unless-stopped

  chromium:
    container_name: mailrs-chromium
    image: zenika/alpine-chrome:latest
    command: ["--no-sandbox", "--remote-debugging-address=0.0.0.0", "--remote-debugging-port=9222", "--disable-gpu", "--headless"]
    restart: unless-stopped

  meilisearch:
    container_name: mailrs-meilisearch
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_MASTER_KEY: ${MAILRS_MEILI_KEY:-mailrs-meili-key}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped

  mailrs:
    container_name: mailrs
    build: .
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "3100:3100"
    environment:
      # core
      MAILRS_HOSTNAME: ${MAILRS_HOSTNAME:-mail.golia.ai}
      MAILRS_MAILDIR: /data/maildir
      MAILRS_PG_URL: postgres://mailrs:${MAILRS_PG_PASSWORD:-mailrs}@postgres:5432/mailrs
      MAILRS_VALKEY_URL: redis://valkey:6379
      MAILRS_WEB_STATIC_DIR: /opt/mailrs/web
      MAILRS_LOCAL_DOMAINS: golia.jp,golia.ai,dadaya.jp,marspot.com,bitreits.com,doracawl.com,madcawl.com
      # tls
      MAILRS_TLS_CERT: /certs/fullchain.pem
      MAILRS_TLS_KEY: /certs/privkey.pem
      # auth
      MAILRS_USERS_FILE: /data/users.toml
      # dkim
      MAILRS_DKIM_SELECTOR: mail
      MAILRS_DKIM_DOMAIN: golia.jp
      MAILRS_DKIM_PRIVATE_KEY: /dkim/golia.jp.key
      # acme
      MAILRS_ACME_EMAIL: ${MAILRS_ACME_EMAIL:-}
      MAILRS_ACME_DOMAINS: ${MAILRS_ACME_DOMAINS:-}
      MAILRS_ACME_DIR: /data/acme
      MAILRS_ACME_STAGING: ${MAILRS_ACME_STAGING:-false}
      # ai analysis
      MAILRS_AI_ANALYSIS_ENABLED: "${MAILRS_AI_ANALYSIS_ENABLED:-false}"
      MAILRS_LLM_URL: "${MAILRS_LLM_URL:-}"
      MAILRS_LLM_API_KEY: "${MAILRS_LLM_API_KEY:-}"
      # anti-spam
      MAILRS_ANTISPAM_ENABLED: "${MAILRS_ANTISPAM_ENABLED:-false}"
      # chrome cdp
      MAILRS_CHROME_CDP_URL: ws://chromium:9222
      # webhook
      MAILRS_WEBHOOK_URL: "${MAILRS_WEBHOOK_URL:-}"
      MAILRS_WEBHOOK_API_KEY: "${MAILRS_WEBHOOK_API_KEY:-}"
      # meilisearch — fast typo-tolerant CJK-friendly search
      MAILRS_MEILI_URL: http://meilisearch:7700
      MAILRS_MEILI_KEY: ${MAILRS_MEILI_KEY:-mailrs-meili-key}
    volumes:
      - mailrs-data:/data
      - ./certs:/certs:ro
      - ./dkim:/dkim:ro
    depends_on:
      - postgres
      - valkey
      - chromium
      - meilisearch
    restart: unless-stopped

volumes:
  mailrs-data:
  pg-data:
  valkey-data:
  meili-data:
