# mailrs staging — RECEIVER-SPLIT topology (P6 final).
#
# Three roles from one ghcr:develop image, replacing the monolith mailrs
# container while reusing the same data volume (spg + maildir + the new
# spool all live under mailrs-staging-data:/data, one mount).
#
#   mailrs-staging-receiver  public SMTP 25/587/465 (ens5 172.31.11.182),
#                            antispam + anti via kevy-server, writes
#                            /data/.spool, emits SpoolDelivered. Zero spg.
#   mailrs-staging-kevy      network kevy: shared anti + SpoolDelivered
#                            notify channel (compose-internal only).
#   mailrs-staging (core)    MAILRS_RECEIVER_SPLIT=1: consumes the spool,
#                            owns spg + embedded kevy + web/imap/pop3/sieve.
#                            No public SMTP ports here (receiver owns them).
#
# Source of truth: this file is in repo, scp'd to t01 by deploy-staging.yml.
# Revert to monolith: ssh t01 + `docker compose -p mailrs-staging -f
# docker-compose.staging.yml up -d`.
services:
  meilisearch:
    container_name: mailrs-staging-meilisearch
    image: getmeili/meilisearch:v1.44
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MAILRS_MEILI_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped

  chromium:
    container_name: mailrs-staging-chromium
    image: zenika/alpine-chrome:124
    command: ["--no-sandbox","--remote-debugging-address=0.0.0.0","--remote-debugging-port=9222","--disable-gpu","--headless"]
    restart: unless-stopped

  kevy-server:
    container_name: mailrs-staging-kevy
    image: ghcr.io/goliajp/kevy:latest
    mem_limit: 1g
    environment:
      KEVY_PORT: "6379"
      KEVY_AOF: "1"
      KEVY_DIR: /data
    volumes:
      - kevy-server-data:/data
    healthcheck:
      test: ["CMD", "kevy-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

  receiver:
    container_name: mailrs-staging-receiver
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    entrypoint: ["mailrs-receiver"]
    pull_policy: always
    mem_limit: 2g
    # receiver runs no web server (3100 is core-only) — disable the image's
    # default curl :3100 healthcheck; liveness = SMTP listener + restart.
    healthcheck:
      disable: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "172.31.11.182:25:25"
      - "172.31.11.182:587:587"
      - "172.31.11.182:465:465"
    environment:
      MAILRS_HOSTNAME: mail.smk.ai
      MAILRS_SPOOL_ROOT: /data/.spool
      MAILRS_KEVY_URL: kevy://kevy-server:6379
      MAILRS_LOCAL_DOMAINS: smk.ai
      MAILRS_PORT: "25"
      MAILRS_SUBMISSION_PORT: "587"
      MAILRS_SMTPS_PORT: "465"
      MAILRS_ANTISPAM_ENABLED: "true"
      MAILRS_TLS_CERT: /certs/fullchain.pem
      MAILRS_TLS_KEY: /certs/privkey.pem
      MAILRS_USERS_FILE: /data/users.toml
    volumes:
      - mailrs-staging-data:/data
      - ./certs:/certs:ro
    depends_on:
      - kevy-server
    restart: unless-stopped

  mailrs:
    container_name: mailrs-staging
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    pull_policy: always
    mem_limit: 10g
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # public SMTP ports removed — owned by the receiver. Core keeps its
    # non-receiving listeners + web.
    ports:
      - "172.31.11.182:143:143"
      - "172.31.11.182:993:993"
      - "172.31.11.182:110:110"
      - "172.31.11.182:995:995"
      - "172.31.11.182:4190:4190"
      - "127.0.0.1:3101:3100"
    environment:
      MAILRS_HOSTNAME: mail.smk.ai
      MAILRS_MAILDIR: /data/maildir
      MAILRS_PG_URL: spg:///data/spg/mailrs.spg
      MAILRS_SPG_FORCE_UNLOCK: "true"
      SPG_PITR_RETENTION_HOURS: "24"
      # spg-embedded 7.34: row-level WAL redo (flag-gated). Cuts crash
      # recovery from O(N x base_rows) statement replay to O(N) physical
      # apply (~242x in the 24k-row probe). Default off in spg; staging
      # opt-in is part of our dogfood.
      SPG_WAL_ROW_REDO: "1"
      # core role under split: drain the receiver's spool.
      MAILRS_RECEIVER_SPLIT: "1"
      MAILRS_SPOOL_ROOT: /data/.spool
      MAILRS_KEVY_URL: kevy://kevy-server:6379
      MAILRS_KEVY_DATA_DIR: /data/kevy
      MAILRS_WEB_STATIC_DIR: /opt/mailrs/web
      MAILRS_LOCAL_DOMAINS: smk.ai
      MAILRS_TLS_CERT: /certs/fullchain.pem
      MAILRS_TLS_KEY: /certs/privkey.pem
      MAILRS_USERS_FILE: /data/users.toml
      MAILRS_DKIM_SELECTOR: mail
      MAILRS_DKIM_DOMAIN: smk.ai
      MAILRS_DKIM_PRIVATE_KEY: /dkim/stg.key
      MAILRS_MEILI_URL: http://meilisearch:7700
      MAILRS_MEILI_KEY: ${MAILRS_MEILI_KEY}
      MAILRS_CHROME_CDP_URL: ws://chromium:9222
      MAILRS_ANTISPAM_ENABLED: "true"
      MAILRS_AI_ANALYSIS_ENABLED: "false"
      # 4-process split (arch/split-fastcore). When MAILRS_CORE_API_SECRET
      # is set the core opens an extra :3300 RPC listener that webapi
      # + sender talk to. Empty / unset = no RPC server (legacy).
      MAILRS_CORE_RPC_ADDR: 0.0.0.0:3300
      MAILRS_CORE_API_SECRET: ${MAILRS_CORE_API_SECRET:-}
    volumes:
      - mailrs-staging-data:/data
      - ./certs:/certs:ro
      - ./dkim:/dkim:ro
    depends_on:
      - kevy-server
    restart: unless-stopped

  # ── 4-process split shadow services ──────────────────────────────
  # webapi + sender both consume mailrs's core-rpc port; bring them up
  # with `--profile split` once MAILRS_CORE_API_SECRET is exported on
  # the host. They are shadow services: webapi binds :3102 on host
  # (distinct from mailrs :3101) so frontend smoke tests can hit one
  # or the other without conflicting; sender is queue-driven so it
  # claims outbound jobs as soon as it boots — leave it down unless
  # you want it to compete with monolith mailrs's sender thread.

  webapi:
    container_name: mailrs-staging-webapi
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    entrypoint: ["mailrs-webapi"]
    pull_policy: always
    profiles: ["split"]
    mem_limit: 1g
    ports:
      - "127.0.0.1:3102:3100"
    environment:
      MAILRS_CORE_RPC_BASE: http://mailrs:3300
      MAILRS_CORE_API_SECRET: ${MAILRS_CORE_API_SECRET:-}
      MAILRS_KEVY_URL: kevy://kevy-server:6379
      MAILRS_WEB_BIND: 0.0.0.0:3100
      MAILRS_WEB_STATIC_DIR: /opt/mailrs/web
      RUST_LOG: info
    depends_on:
      - mailrs
      - kevy-server
    restart: unless-stopped

  # Phase 8 — kevy-backed core RPC. Brought up on `--profile fastcore`
  # next to the monolith mailrs container (NOT instead of it). Listens
  # on :3201 host-side so webapi can be repointed at it via
  # MAILRS_CORE_RPC_BASE=http://fastcore:3301 to A/B against monolith :3300.
  fastcore:
    container_name: mailrs-staging-fastcore
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    entrypoint: ["mailrs-fastcore"]
    pull_policy: always
    profiles: ["fastcore"]
    mem_limit: 1g
    ports:
      - "127.0.0.1:3201:3301"
    environment:
      MAILRS_FASTCORE_BIND: 0.0.0.0:3301
      MAILRS_KEVY_DATA_DIR: /data/kevy-fastcore
      RUST_LOG: info
    volumes:
      - mailrs-staging-data:/data
    restart: unless-stopped

  sender:
    container_name: mailrs-staging-sender
    image: ghcr.io/goliajp/mailrs:${MAILRS_VERSION:-latest}
    entrypoint: ["mailrs-sender"]
    pull_policy: always
    profiles: ["split"]
    mem_limit: 512m
    environment:
      MAILRS_CORE_RPC_BASE: http://mailrs:3300
      MAILRS_CORE_API_SECRET: ${MAILRS_CORE_API_SECRET:-}
      MAILRS_HOSTNAME: mail.smk.ai
      MAILRS_DKIM_SELECTOR: mail
      MAILRS_DKIM_DOMAIN: smk.ai
      MAILRS_DKIM_PRIVATE_KEY: /dkim/stg.key
      RUST_LOG: info
    volumes:
      - ./dkim:/dkim:ro
    depends_on:
      - mailrs
    restart: unless-stopped

volumes:
  mailrs-staging-data:
  meili-data:
  kevy-server-data:
